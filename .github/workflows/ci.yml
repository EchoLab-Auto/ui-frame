name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build library
        run: npm run build

      - name: Build example
        run: npm run example:build

      - name: Verify outputs
        run: |
          echo "=== Library ==="
          test -f dist/ui-frame.js        || { echo "MISSING: dist/ui-frame.js";        exit 1; }
          test -f dist/ui-frame.umd.cjs   || { echo "MISSING: dist/ui-frame.umd.cjs";   exit 1; }
          test -f dist/style.css          || { echo "MISSING: dist/style.css";          exit 1; }
          test -f dist/index.d.ts         || { echo "MISSING: dist/index.d.ts";         exit 1; }
          echo "=== Example ==="
          test -f dist-example/index.html || { echo "MISSING: dist-example/index.html"; exit 1; }
          echo "OK — all outputs verified"

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

      - name: Upload example artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-example
          path: dist-example/
          if-no-files-found: error
