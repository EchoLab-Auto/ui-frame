name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HUSKY: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build library
        run: npm run build

      - name: Build example
        run: npm run example:build

      - name: Verify outputs
        run: |
          echo "=== Library core ==="
          test -f dist/ui-frame.js        || { echo "MISSING: dist/ui-frame.js";        exit 1; }
          test -f dist/ui-frame.umd.cjs   || { echo "MISSING: dist/ui-frame.umd.cjs";   exit 1; }
          test -f dist/style.css          || { echo "MISSING: dist/style.css";          exit 1; }
          test -f dist/index.d.ts         || { echo "MISSING: dist/index.d.ts";         exit 1; }
          echo "=== Library subpath exports ==="
          test -d dist/composables        || { echo "MISSING: dist/composables";       exit 1; }
          test -f dist/extensions/index.js  || { echo "MISSING: dist/extensions/index.js";   exit 1; }
          test -f dist/extensions/index.d.ts || { echo "MISSING: dist/extensions/index.d.ts"; exit 1; }
          test -f dist/utils/index.js        || { echo "MISSING: dist/utils/index.js";        exit 1; }
          test -f dist/utils/index.d.ts      || { echo "MISSING: dist/utils/index.d.ts";      exit 1; }
          echo "=== Example ==="
          test -f dist-example/index.html || { echo "MISSING: dist-example/index.html"; exit 1; }
          echo "OK — all outputs verified"

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

      - name: Upload example artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-example
          path: dist-example/
          if-no-files-found: error
