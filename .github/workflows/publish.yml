name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HUSKY: 0

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm install -g npm@11
      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build library
        run: npm run build

      - name: Verify outputs
        run: |
          test -f dist/ui-frame.js      || { echo "MISSING: dist/ui-frame.js";      exit 1; }
          test -f dist/ui-frame.umd.cjs || { echo "MISSING: dist/ui-frame.umd.cjs"; exit 1; }
          test -f dist/style.css        || { echo "MISSING: dist/style.css";        exit 1; }
          test -f dist/index.d.ts       || { echo "MISSING: dist/index.d.ts";       exit 1; }
          echo "OK — all outputs verified"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
